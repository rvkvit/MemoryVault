# render.yaml — Render Blueprints for MemoryVault
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO DEPLOY
# ─────────────
# 1. Push this repo to GitHub (done).
# 2. Go to https://dashboard.render.com → New → Blueprint.
# 3. Connect your GitHub repo — Render picks up this file automatically.
# 4. Before clicking "Apply", set the two secrets marked sync:false in the
#    Render dashboard (ADMIN_PASSWORD_HASH and ADMIN_EMAILS).
# 5. Click Apply. Both services + the persistent disk are created for you.
#
# COSTS (approximate)
# ───────────────────
# memoryvault-api  Starter plan  $7/month   (needed for persistent disk)
# memoryvault-data Persistent disk  $0.25/GB/month ≈ $0.25 for 1 GB
# memoryvault-web  Free plan     $0          (spins down after inactivity)
#
# SECRETS TO SET MANUALLY IN THE DASHBOARD
# ─────────────────────────────────────────
# memoryvault-api → Environment → ADMIN_PASSWORD_HASH
#   Generate: python -c "from passlib.hash import bcrypt; print(bcrypt.hash('yourpassword'))"
#
# memoryvault-api → Environment → ADMIN_EMAILS
#   Comma-separated admin email addresses, e.g. rvk.vit@gmail.com
#
# JWT_SECRET_KEY and STATE_HMAC_SECRET are auto-generated by Render (generateValue: true).

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: memoryvault-api
    runtime: python
    rootDir: apps/api
    plan: starter

    buildCommand: pip install -r requirements.txt

    # Run DB migrations then start the server.
    # $PORT is injected by Render — must bind 0.0.0.0, not 127.0.0.1.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    # Persistent disk — survives deploys and restarts.
    # Stores the SQLite database and all user-uploaded files.
    disk:
      name: memoryvault-data
      mountPath: /data
      sizeGB: 1

    envVars:
      # ── App ────────────────────────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

      # Public URL of this service (matches the Render service name above).
      # If you rename the service, update this URL to match.
      - key: APP_BASE_URL
        value: https://memoryvault-api.onrender.com

      # Public URL of the web frontend (matches service name below).
      - key: FRONTEND_URL
        value: https://memoryvault-web.onrender.com

      # ── Database ────────────────────────────────────────────────────────────
      # Four slashes = absolute path on the persistent disk mount.
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/farewell.db

      # ── File uploads ────────────────────────────────────────────────────────
      # Files are written to the persistent disk and served by FastAPI's
      # StaticFiles mount at /uploads.
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: UPLOADS_BASE_URL
        value: https://memoryvault-api.onrender.com/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"

      # ── CORS ────────────────────────────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://memoryvault-web.onrender.com

      # ── Auth — secrets auto-generated by Render ─────────────────────────────
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: STATE_HMAC_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_HOURS
        value: "8"
      - key: INVITATION_TOKEN_EXPIRE_DAYS
        value: "30"

      # ── Secrets — set these manually in the Render dashboard ─────────────────
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_EMAILS
        sync: false

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  - type: web
    name: memoryvault-web
    runtime: node
    rootDir: apps/web
    plan: free

    buildCommand: npm ci && npm run build

    # next start reads $PORT automatically.
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      # Used by next.config.ts rewrites to proxy /api/v1/* to the backend.
      # Must match the API service URL above.
      - key: BACKEND_URL
        value: https://memoryvault-api.onrender.com
