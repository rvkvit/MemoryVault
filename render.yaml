# render.yaml — Render Blueprints for MemoryVault
# Docs: https://render.com/docs/blueprint-spec
#
# HOW TO DEPLOY
# ─────────────
# 1. Push this repo to GitHub (done).
# 2. Go to https://dashboard.render.com → New → Blueprint.
# 3. Connect your GitHub repo — Render picks up this file automatically.
# 4. Before clicking "Apply", set the secrets marked sync:false in the
#    Render dashboard (DATABASE_URL, Cloudinary keys, admin secrets).
# 5. Click Apply. Both services are created automatically — no disk needed.
#
# COSTS
# ─────
# Both services run on Render's Free tier ($0/month).
# Storage is handled by Neon PostgreSQL (free tier) and Cloudinary (free tier).
#
# SECRETS TO SET IN THE DASHBOARD (all marked sync:false below)
# ─────────────────────────────────────────────────────────────
# DATABASE_URL        — Neon connection string (postgresql://user:pass@host/db?sslmode=require)
# CLOUDINARY_CLOUD_NAME / _API_KEY / _API_SECRET — from cloudinary.com dashboard
# ADMIN_PASSWORD_HASH — bcrypt hash of your admin password
#                       python -c "from passlib.hash import bcrypt; print(bcrypt.hash('yourpassword'))"
# ADMIN_EMAILS        — comma-separated admin email addresses
#
# JWT_SECRET_KEY and STATE_HMAC_SECRET are auto-generated by Render.
#
# URL VARIABLES — SET AFTER FIRST DEPLOY
# ──────────────────────────────────────
# Render may add a suffix to your service name (e.g. memoryvault-api-6gxq.onrender.com).
# After the services are created and Render shows you the actual URLs, set:
#
#   On memoryvault-api:
#     APP_BASE_URL  → https://<your-actual-api-url>.onrender.com
#     FRONTEND_URL  → https://<your-actual-web-url>.onrender.com
#                     (CORS is auto-derived from FRONTEND_URL — no extra variable needed)
#
#   On memoryvault-web:
#     BACKEND_URL   → https://<your-actual-api-url>.onrender.com
#
# If these are not set, invitation links will have wrong URLs.

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: memoryvault-api
    runtime: python
    rootDir: apps/api
    plan: free

    buildCommand: pip install -r requirements.txt

    # Render runs commands from rootDir (apps/api), so relative paths work as-is.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      # ── App ────────────────────────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      # Set to your actual API URL after first deploy (see comment at top of file)
      - key: APP_BASE_URL
        sync: false
      # Set to your actual frontend URL after first deploy
      - key: FRONTEND_URL
        sync: false

      # ── Database — set your Neon connection string in the dashboard ─────────
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"

      # ── Cloudinary — set all three in the dashboard ─────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # CORS_ALLOWED_ORIGINS is not listed here — it auto-derives from FRONTEND_URL.
      # Add it manually in the dashboard only if you need to allow extra origins.

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: STATE_HMAC_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_HOURS
        value: "8"
      - key: INVITATION_TOKEN_EXPIRE_DAYS
        value: "30"

      # ── Admin secrets — set in dashboard ────────────────────────────────────
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_EMAILS
        sync: false

      - key: MAX_UPLOAD_SIZE_MB
        value: "50"

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  - type: web
    name: memoryvault-web
    runtime: node
    rootDir: apps/web
    plan: free

    # --include=dev is required: NODE_ENV=production causes npm ci to skip
    # devDependencies by default, but Next.js needs typescript at build time.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      # Set to your actual API URL after first deploy (used by next.config.ts rewrites)
      - key: BACKEND_URL
        sync: false
